<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>IMI Health</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <!-- Main card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;">

          <!-- Header / Logo bar -->
          <tr>
            <td style="background-color:#ffffff;padding:24px 32px;text-align:center;border-bottom:1px solid #e2e8f0;">
              <img src="https://www.imihealth.ai/assets/images/imihealth-logo.webp" alt="IMI Health" width="180" style="display:block;margin:0 auto;max-width:180px;height:auto;" />
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px;color:#0f172a;font-size:15px;line-height:1.6;">
              <h1 style="margin:0 0 16px;font-size:24px;font-weight:700;color:#0f172a;">Confirma tu cuenta</h1>
              <p style="margin:0 0 24px;color:#64748b;">
                Haz clic en el bot&oacute;n de abajo para confirmar tu direcci&oacute;n de correo electr&oacute;nico.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td align="center" style="border-radius:8px;background-color:#2a9d90;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:8px;">
                      Confirmar correo electr&oacute;nico
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:13px;color:#64748b;">
                Si no creaste esta cuenta, puedes ignorar este mensaje.
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 32px;text-align:center;color:#64748b;font-size:12px;line-height:1.5;">
              <p style="margin:0 0 4px;">
                &copy; 2026 IMI Health
              </p>
              <p style="margin:0;">
                <a href="https://imihealth.ai" style="color:#2a9d90;text-decoration:none;">imihealth.ai</a>
              </p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
